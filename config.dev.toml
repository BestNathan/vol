# config.dev.toml - Local development configuration
# 用于本地开发和测试的配置
#
# Required environment variables:
# - DERIBIT_CLIENT_ID: Deribit API client ID
# - DERIBIT_CLIENT_SECRET: Deribit API client secret
# - HTTPS_PROXY: HTTP proxy for restricted environments (e.g., http://192.168.2.98:8890)
# - HTTP_PROXY: HTTP proxy for restricted environments
# - NO_PROXY: Comma-separated list of hosts to bypass proxy

[engine]
hot_reload = true
hot_reload_interval_secs = 30
channel_buffer_size = 1000
alert_cooldown_secs = 60  # Shorter cooldown for testing

[engine.tenor_cooldowns]
short_secs = 120
medium_secs = 300
long_secs = 600

[tenors]
short_max_dte = 7
medium_min_dte = 20
medium_max_dte = 40
long_min_dte = 80
long_max_dte = 200

# Client configuration - uses environment variables for sensitive data
[clients.deribit]
# Override with DERIBIT_WS_URL env var if set
ws_url = "wss://test.deribit.com/ws/api/v2"
# client_id and client_secret from environment:
# - DERIBIT_CLIENT_ID
# - DERIBIT_CLIENT_SECRET

# Data sources
[[datasources]]
id = "deribit-markets"
type = "volatility"
symbols = ["BTC", "ETH"]

[[datasources]]
id = "portfolio"
type = "portfolio"
currencies = ["BTC", "ETH"]
poll_interval_secs = 60  # Less frequent for local dev

# Notifications - disabled by default for local dev
[[notifications]]
id = "stdout"
type = "stdout"
enabled = true

# Feishu disabled by default for local dev
# [[notifications]]
# id = "feishu-alerts"
# type = "feishu"
# enabled = false

# Rules - relaxed thresholds for testing
[[rules]]
id = "absolute-iv-btc"
type = "absolute-iv"
symbol = "BTC"
short_threshold = 0.80  # Higher threshold for testing
medium_threshold = 0.75
long_threshold = 0.70
short_atm_threshold = 0.10
medium_atm_threshold = 0.15
long_atm_threshold = 0.20
dte_atm_thresholds = { "1" = 0.05, "2" = 0.06, "3" = 0.07 }
enabled = true
notifications = ["stdout"]

[[rules]]
id = "absolute-iv-eth"
type = "absolute-iv"
symbol = "ETH"
short_threshold = 0.90
medium_threshold = 0.85
long_threshold = 0.80
short_atm_threshold = 0.12
medium_atm_threshold = 0.17
long_atm_threshold = 0.22
dte_atm_thresholds = { "1" = 0.06, "2" = 0.07, "3" = 0.08 }
enabled = true
notifications = ["stdout"]

[[rules]]
id = "rate-change-btc"
type = "rate-change"
symbol = "BTC"
window_1h_threshold = 0.10
window_4h_threshold = 0.15
window_24h_threshold = 0.30
enabled = true
notifications = ["stdout"]

[[rules]]
id = "rate-change-eth"
type = "rate-change"
symbol = "ETH"
window_1h_threshold = 0.10
window_4h_threshold = 0.15
window_24h_threshold = 0.30
enabled = true
notifications = ["stdout"]

[[rules]]
id = "term-structure"
type = "term-structure"
short_long_spread_threshold = 0.20
enabled = false
notifications = ["stdout"]

[[rules]]
id = "skew"
type = "skew"
symbol = "BTC"
threshold = 0.15
enabled = false
notifications = ["stdout"]

[[rules]]
id = "portfolio-greeks"
type = "portfolio"
enabled = false
metrics = [
    { type = "delta_exposure", enabled = true, min_threshold = -100.0, max_threshold = 100.0 },
    { type = "total_greeks", enabled = true, gamma_threshold = 50.0, vega_threshold = 200.0, theta_threshold = 100.0 },
    { type = "free_balance", enabled = true, min_threshold = 0.5 },
    { type = "margin_ratio", enabled = true, min_threshold = 1.25 },
]
notifications = ["stdout"]

# Tracing configuration for local development
[tracing]
[tracing.logging]
log_dir = "./logs"
log_prefix = "vol-monitor-dev"
retention_days = 3
max_file_size_mb = 100  # 100MB max file size before rotation
json_format = false  # Human-readable for local dev
console_level = "debug"
file_level = "debug"
error_file = true

[tracing.opentelemetry]
enabled = false  # Disabled by default for local dev
# Override with OTEL_ENDPOINT env var
endpoint = "http://localhost:4317"
service_name = "vol-monitor-dev"
service_namespace = "deribit-dev"
deployment_environment = "development"
sample_rate = 1.0

[tracing.opentelemetry.batch]
max_queue_size = 512
max_batch_size = 128
scheduled_delay_millis = 1000
max_export_timeout_millis = 5000

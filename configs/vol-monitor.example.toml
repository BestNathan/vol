# config.toml - Default vol-monitor configuration
# 默认配置文件
#
# 注意：敏感凭证应通过环境变量注入
# Sensitive credentials should be injected via environment variables
#
# Required environment variables:
# - DERIBIT_CLIENT_ID: Deribit API client ID
# - DERIBIT_CLIENT_SECRET: Deribit API client secret
# - FEISHU_APP_ID: Feishu app ID (if using Feishu notifications)
# - FEISHU_APP_SECRET: Feishu app secret
# - FEISHU_RECEIVE_ID: Feishu message recipient ID

[engine]
hot_reload = true
hot_reload_interval_secs = 30
channel_buffer_size = 1000
alert_cooldown_secs = 300

[engine.tenor_cooldowns]
short_secs = 600
medium_secs = 3600
long_secs = 14400

[tenors]
short_max_dte = 7
medium_min_dte = 20
medium_max_dte = 40
long_min_dte = 80
long_max_dte = 200

# Client configuration - credentials from environment variables
[clients.deribit]
ws_url = "wss://www.deribit.com/ws/api/v2"
# Credentials from env: DERIBIT_CLIENT_ID, DERIBIT_CLIENT_SECRET

# Data sources
[[datasources]]
id = "deribit-markets"
type = "volatility"
symbols = ["BTC", "ETH"]

[[datasources]]
id = "portfolio"
type = "portfolio"
currencies = ["BTC", "ETH"]
poll_interval_secs = 30

# Notifications
[[notifications]]
id = "feishu-alerts"
type = "feishu"
# Credentials from env: FEISHU_APP_ID, FEISHU_APP_SECRET, FEISHU_RECEIVE_ID
enabled = true

[[notifications]]
id = "stdout"
type = "stdout"
enabled = true

# Rules
[[rules]]
id = "absolute-iv-btc"
type = "absolute-iv"
symbol = "BTC"
short_threshold = 0.55
medium_threshold = 0.53
long_threshold = 0.51
short_atm_threshold = 0.05
medium_atm_threshold = 0.08
long_atm_threshold = 0.10
dte_atm_thresholds = { "1" = 0.02, "2" = 0.03, "3" = 0.04 }
enabled = true
notifications = ["feishu-alerts", "stdout"]

[[rules]]
id = "absolute-iv-eth"
type = "absolute-iv"
symbol = "ETH"
short_threshold = 0.75
medium_threshold = 0.73
long_threshold = 0.71
short_atm_threshold = 0.07
medium_atm_threshold = 0.10
long_atm_threshold = 0.12
dte_atm_thresholds = { "1" = 0.03, "2" = 0.04, "3" = 0.05 }
enabled = true
notifications = ["feishu-alerts", "stdout"]

[[rules]]
id = "rate-change-btc"
type = "rate-change"
symbol = "BTC"
window_1h_threshold = 0.05
window_4h_threshold = 0.10
window_24h_threshold = 0.20
enabled = true
notifications = ["feishu-alerts", "stdout"]

[[rules]]
id = "rate-change-eth"
type = "rate-change"
symbol = "ETH"
window_1h_threshold = 0.05
window_4h_threshold = 0.10
window_24h_threshold = 0.20
enabled = true
notifications = ["feishu-alerts", "stdout"]

[[rules]]
id = "term-structure"
type = "term-structure"
short_long_spread_threshold = 0.15
enabled = false
notifications = ["stdout"]

[[rules]]
id = "skew"
type = "skew"
symbol = "BTC"
threshold = 0.10
enabled = false
notifications = ["stdout"]

[[rules]]
id = "portfolio-margin"
type = "margin-ratio"
datasources = ["internal-portfolio"]
min_threshold = 1.2
enabled = false
notifications = ["feishu-alerts"]

[[rules]]
id = "portfolio-greeks"
type = "portfolio"
enabled = true
metrics = [
    { type = "delta_exposure", enabled = true, min_threshold = -100.0, max_threshold = 100.0 },
    { type = "total_greeks", enabled = true, gamma_threshold = 50.0, vega_threshold = 200.0, theta_threshold = 100.0 },
    { type = "free_balance", enabled = true, min_threshold = 0.5 },
    { type = "margin_ratio", enabled = true, min_threshold = 1.25 },
]
notifications = ["feishu-alerts", "stdout"]

# Tracing configuration
[tracing]
[tracing.logging]
log_dir = "/var/log/vol-monitor"
log_prefix = "vol-monitor"
retention_days = 7
json_format = true
console_level = "info"
file_level = "debug"
error_file = true

[tracing.opentelemetry]
enabled = true
endpoint = "http://jaeger-collector.observability.svc.cluster.local:4317"
service_name = "vol-monitor"
service_namespace = "deribit"
deployment_environment = "production"
sample_rate = 1.0

[tracing.opentelemetry.batch]
max_queue_size = 2048
max_batch_size = 512
scheduled_delay_millis = 5000
max_export_timeout_millis = 30000

# k8s/secrets.yaml - Sensitive credentials for vol-monitor
# 敏感凭证 - 请妥善保管
#
# IMPORTANT: These values should be managed securely:
# 1. Use sealed-secrets, external-secrets, or vault for production
# 2. Never commit actual secrets to git
# 3. Use CI/CD to inject real values at deploy time
#
# This file contains placeholder values for reference only.
# Replace with actual values using:
#   kubectl create secret generic vol-monitor-secrets \
#     --from-literal=deribit-client-id=<actual-id> \
#     --from-literal=deribit-client-secret=<actual-secret> \
#     --from-literal=feishu-app-id=<actual-app-id> \
#     --from-literal=feishu-app-secret=<actual-app-secret> \
#     --from-literal=feishu-receive-id=<actual-receive-id> \
#     -n deribit

apiVersion: v1
kind: Secret
metadata:
  name: vol-monitor-secrets
  namespace: deribit
  labels:
    app: vol-monitor
type: Opaque
stringData:
  # Deribit API credentials
  DERIBIT_CLIENT_ID: "your-deribit-client-id"
  DERIBIT_CLIENT_SECRET: "your-deribit-client-secret"

  # Feishu/Lark credentials
  FEISHU_APP_ID: "your-feishu-app-id"
  FEISHU_APP_SECRET: "your-feishu-app-secret"
  FEISHU_RECEIVE_ID: "your-feishu-receive-id"

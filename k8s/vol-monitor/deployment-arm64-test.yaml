apiVersion: apps/v1
kind: Deployment
metadata:
  name: vol-monitor-arm64-test
  namespace: deribit
  labels:
    app: vol-monitor
    arch: arm64
    test: multiarch-cross-compile
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vol-monitor
      arch: arm64
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: vol-monitor
        arch: arm64
        test: multiarch-cross-compile
    spec:
      restartPolicy: Always
      # Schedule on arm64 node only
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
      - name: vol-monitor
        image: crpi-ck06yio90i1ttwlz.cn-beijing.personal.cr.aliyuncs.com/n_common/vol-monitor:beta
        imagePullPolicy: Always
        workingDir: /etc/vol-monitor
        args:
          - "--config"
          - "config.toml"
        volumeMounts:
        - name: config
          mountPath: /etc/vol-monitor
          readOnly: true
        # Verify architecture at startup
        command:
          - /bin/sh
          - -c
          - |
            echo "=== Container Architecture Check ==="
            echo "uname -m: $(uname -m)"
            echo "Binary files:"
            ls -lh /usr/local/bin/vol-monitor-* 2>/dev/null || echo "No binaries found!"
            echo "=== Starting vol-monitor ==="
            exec /usr/local/bin/vol-monitor --config config.toml
        env:
        # Deribit API credentials (from Secrets)
        - name: DERIBIT_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: vol-monitor-secrets
              key: DERIBIT_CLIENT_ID
        - name: DERIBIT_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: vol-monitor-secrets
              key: DERIBIT_CLIENT_SECRET

        # Feishu credentials (from Secrets)
        - name: FEISHU_APP_ID
          valueFrom:
            secretKeyRef:
              name: vol-monitor-secrets
              key: FEISHU_APP_ID
        - name: FEISHU_APP_SECRET
          valueFrom:
            secretKeyRef:
              name: vol-monitor-secrets
              key: FEISHU_APP_SECRET
        - name: FEISHU_RECEIVE_ID
          valueFrom:
            secretKeyRef:
              name: vol-monitor-secrets
              key: FEISHU_RECEIVE_ID

        # Tracing
        - name: OTEL_ENDPOINT
          value: "http://jaeger-collector.observability.svc.cluster.local:4317"
        # Logging
        - name: RUST_LOG
          value: "info,vol_llm_bridge=debug,vol_llm_agent=debug"
        # Network (required in restricted environment)
        - name: HTTPS_PROXY
          value: "http://192.168.2.98:8890"
        - name: HTTP_PROXY
          value: "http://192.168.2.98:8890"
        - name: NO_PROXY
          value: "localhost,127.0.0.1,192.168.0.0/16,10.0.0.0/8,kubernetes.default.svc,.svc.cluster.local"
        # Resource limits for ARM single-board computer
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: vol-monitor-config
          items:
          - key: config.toml
          defaultMode: 0644

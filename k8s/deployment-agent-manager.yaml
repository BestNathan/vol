apiVersion: apps/v1
kind: Deployment
metadata:
  name: vol-agent-manager
  namespace: deribit
  labels:
    app: vol-agent-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vol-agent-manager
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: vol-agent-manager
    spec:
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
      - name: vol-agent-manager
        image: crpi-ck06yio90i1ttwlz.cn-beijing.personal.cr.aliyuncs.com/n_common/vol-monitor:agent-manager-latest
        imagePullPolicy: Always
        args:
          - "--config"
          - "config.toml"
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        # LLM API key
        - name: ANTHROPIC_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: vol-monitor-secrets
              key: FEISHU_APP_SECRET  # placeholder - add ANTHROPIC_AUTH_TOKEN to secrets

        # Network (required in restricted environment)
        - name: HTTPS_PROXY
          value: "http://192.168.2.98:8890"
        - name: HTTP_PROXY
          value: "http://192.168.2.98:8890"
        - name: NO_PROXY
          value: "localhost,127.0.0.1,192.168.0.0/16,10.0.0.0/8,kubernetes.default.svc,.svc.cluster.local,dashscope.aliyuncs.com"
        # Logging
        - name: RUST_LOG
          value: "vol_agent_manager=info"
---
apiVersion: v1
kind: Service
metadata:
  name: vol-agent-manager
  namespace: deribit
spec:
  selector:
    app: vol-agent-manager
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP

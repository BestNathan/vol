apiVersion: v1
kind: Secret
metadata:
  name: agent-server-secrets
  namespace: deribit
  labels:
    app: agent-server
type: Opaque
stringData:
  ANTHROPIC_AUTH_TOKEN: "sk-placeholder-replace-me"
  OPENAI_API_KEY: "placeholder-replace-me"

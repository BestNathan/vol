# Build and push vol-agent-server multi-arch images (amd64 + arm64) to GHCR.
#
# Strategy: build amd64 and arm64 on native runners in parallel, then merge
# the two per-arch manifests into a single multi-arch tag with buildx
# imagetools. This avoids QEMU emulation entirely (qemu + aws-lc-sys turns
# a 5-minute compile into a 40-minute one).
#
# Two role-specific images per commit, sharing one repo:
#   ghcr.io/bestnathan/vol-agent-server:cp-<sha>   (control plane)
#   ghcr.io/bestnathan/vol-agent-server:dp-<sha>   (data plane)
#
# Uses the built-in GITHUB_TOKEN for GHCR auth — no extra secrets needed.
# Requires packages: write permission on the job.

name: build-vol-agent-server

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "configs/vol-agent-server.*.toml"
      - "dockers/vol-agent-server.Dockerfile"
      - ".cargo/config.toml"
      - ".github/workflows/build-vol-agent-server.yml"
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push images to GHCR (uncheck to build-only)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

env:
  GHCR_REPO: ghcr.io/bestnathan
  IMAGE_NAME: vol-agent-server

concurrency:
  group: build-vol-agent-server
  cancel-in-progress: false

jobs:
  # ── Quality gate: fmt + check + test + clippy + boundaries ───────────────
  test:
    name: test (${{ matrix.crate }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        crate:
          - vol-agent-server
          - vol-llm-agent-protocol
          - vol-llm-runtime
          - vol-llm-sandbox
          - vol-llm-task
          - vol-session
          - vol-llm-core
          - vol-llm-agent
          - vol-llm-provider
          - vol-llm-tool
          - vol-llm-skill
          - vol-llm-mcp
          - vol-llm-context
          - vol-llm-memory
          - vol-llm-wiki
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: "."
          cache-all-crates: "true"

      - name: Run tests
        run: cargo test -p ${{ matrix.crate }} --no-fail-fast

      - name: Run clippy
        run: cargo clippy -p ${{ matrix.crate }}

  # ── Per-arch builds run on native runners ────────────────────────────────
  build:
    name: build (${{ matrix.variant }}, ${{ matrix.role }}, ${{ matrix.arch }})
    needs: test
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [debian, alpine]
        role: [control-plane, data-plane]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether to push
        id: push
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.push_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.push.outputs.value == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/vol-agent-server${{ matrix.variant == 'alpine' && '.alpine' || '' }}.Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            ROLE=${{ matrix.role }}
            REGION=global
          # Push by digest only — tags are attached later in the manifest job.
          outputs: type=image,name=${{ env.GHCR_REPO }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ steps.push.outputs.value == 'true' }}
          provenance: false
          cache-from: type=gha,scope=vol-agent-server-${{ matrix.variant }}-${{ matrix.role }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=vol-agent-server-${{ matrix.variant }}-${{ matrix.role }}-${{ matrix.arch }}

      - name: Export digest
        if: steps.push.outputs.value == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: steps.push.outputs.value == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.variant }}-${{ matrix.role }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Merge per-arch images into one multi-arch tag, per variant + role ────
  manifest:
    name: manifest (${{ matrix.variant }}, ${{ matrix.role }})
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true'
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: debian
            role: control-plane
            tag_prefix: cp
          - variant: debian
            role: data-plane
            tag_prefix: dp
          - variant: alpine
            role: control-plane
            tag_prefix: cp-alpine
          - variant: alpine
            role: data-plane
            tag_prefix: dp-alpine

    steps:
      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.variant }}-${{ matrix.role }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Compose tag args
        id: tags
        run: |
          IMG="${GHCR_REPO}/${IMAGE_NAME}"
          PREFIX="${{ matrix.tag_prefix }}"
          SHA="${{ steps.sha.outputs.short }}"
          TAGS=("${IMG}:${PREFIX}-${SHA}")
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS+=("${IMG}:${PREFIX}-latest")
          fi
          ARGS=""
          for t in "${TAGS[@]}"; do ARGS="$ARGS -t $t"; done
          {
            echo "args=$ARGS"
            echo "img=$IMG"
            echo "list<<EOF"
            for t in "${TAGS[@]}"; do echo "$t"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        # shellcheck disable=SC2046,SC2086
        run: |
          digests=$(printf '${{ steps.tags.outputs.img }}@sha256:%s ' *)
          # shellcheck disable=SC2086
          docker buildx imagetools create ${{ steps.tags.outputs.args }} $digests

      - name: Inspect
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            echo "── $tag"
            docker buildx imagetools inspect "$tag"
          done <<< "${{ steps.tags.outputs.list }}"

      - name: Summary
        run: |
          {
            echo "### vol-agent-server (${{ matrix.variant }}, ${{ matrix.role }})"
            echo
            echo "- short SHA: \`${{ steps.sha.outputs.short }}\`"
            echo "- platforms: linux/amd64, linux/arm64"
            echo
            echo "Tags:"
            while IFS= read -r tag; do
              [ -n "$tag" ] || continue
              echo "- \`$tag\`"
            done <<< "${{ steps.tags.outputs.list }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        if: matrix.variant == 'debian'
        uses: actions/checkout@v4

      - name: Update GitOps manifests
        if: matrix.variant == 'debian'
        env:
          TAG_PREFIX: ${{ matrix.tag_prefix }}
          SHORT_SHA: ${{ steps.sha.outputs.short }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          short_sha = os.environ["SHORT_SHA"]
          prefix = os.environ["TAG_PREFIX"]
          image = f"ghcr.io/bestnathan/vol-agent-server:{prefix}-{short_sha}"

          if prefix == "cp":
              manifests = ["deploy/argocd/manifests/workloads/agent-server/deployment.yaml"]
          else:  # dp
              manifests = [
                  "deploy/argocd/manifests/workloads/agent-server-dp/deployment.yaml",
                  "deploy/argocd/manifests/workloads/agent-server-ansible/deployment.yaml",
                  "deploy/argocd/manifests/workloads/agent-server-dingtalk/deployment.yaml",
              ]

          for manifest_path in manifests:
              manifest = Path(manifest_path)
              lines = manifest.read_text().splitlines()
              updated = []
              replaced = False
              for line in lines:
                  stripped = line.strip()
                  if stripped.startswith("image: ") and "vol-agent-server" in stripped:
                      indent = line[: len(line) - len(line.lstrip())]
                      updated.append(f"{indent}image: {image}")
                      replaced = True
                  else:
                      updated.append(line)
              if not replaced:
                  raise SystemExit(f"no image field found in {manifest_path}")
              manifest.write_text("\n".join(updated) + "\n")
              print(f"Updated {manifest_path} -> {image}")
          PY

      - name: Commit GitOps manifest update
        if: matrix.variant == 'debian'
        run: |
          if git diff --quiet -- deploy/argocd/manifests/workloads/agent-server*/deployment.yaml; then
            echo "No GitOps manifest change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/argocd/manifests/workloads/agent-server/deployment.yaml \
                  deploy/argocd/manifests/workloads/agent-server-dp/deployment.yaml \
                  deploy/argocd/manifests/workloads/agent-server-ansible/deployment.yaml \
                  deploy/argocd/manifests/workloads/agent-server-dingtalk/deployment.yaml
          git commit -m "ci(gitops): update agent-server image to cp-${{ steps.sha.outputs.short }} / dp-${{ steps.sha.outputs.short }} [skip ci]"
          git pull --rebase origin main
          git push

  # ── Prune old per-commit tags from GHCR after a successful push ──────────
  # Keeps the floating <prefix>-latest tag plus the N most recent commit sha
  # tags per role (sourced from `git log` on the branch this run built).
  # Uses the gh CLI (pre-installed on GitHub runners) to talk to the GHCR
  # Packages API.
  prune:
    name: prune (${{ matrix.variant }}, ${{ matrix.role }})
    runs-on: ubuntu-24.04
    needs: manifest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: debian
            role: control-plane
            tag_prefix: cp
          - variant: debian
            role: data-plane
            tag_prefix: dp
          - variant: alpine
            role: control-plane
            tag_prefix: cp-alpine
          - variant: alpine
            role: data-plane
            tag_prefix: dp-alpine
    env:
      KEEP_LAST: "5"

    steps:
      - name: Checkout (last 50 commits, enough for keep window)
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Compute keep set
        id: keep
        env:
          PREFIX: ${{ matrix.tag_prefix }}
        run: |
          set -eu
          # The N most recent commits on the current ref → short SHAs → "<prefix>-<sha>"
          mapfile -t SHAS < <(git log -n "$KEEP_LAST" --format='%h' --abbrev=7 HEAD)
          KEEP=("${PREFIX}-latest")
          for s in "${SHAS[@]}"; do KEEP+=("${PREFIX}-${s}"); done
          {
            echo "list<<EOF"
            for k in "${KEEP[@]}"; do echo "$k"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Keeping:"
          printf '  - %s\n' "${KEEP[@]}"

      - name: Authenticate gh CLI
        run: echo "${{ github.token }}" | gh auth login --with-token

      - name: Prune stale tags
        env:
          PACKAGE: vol-agent-server
          OWNER: ${{ github.repository_owner }}
          PREFIX: ${{ matrix.tag_prefix }}
          KEEP_TAGS: ${{ steps.keep.outputs.list }}
        run: |
          set -eu
          # Build keep set from the tag names we computed above.
          declare -A keep_tag
          while IFS= read -r t; do
            [ -n "$t" ] || continue
            keep_tag["$t"]=1
          done <<< "$KEEP_TAGS"

          echo "Keep tags: ${!keep_tag[*]}"

          # Iterate all package versions, delete any that don't have a kept tag.
          deleted=0
          examined=0
          while IFS=$'\t' read -r version_id tags; do
            [ -n "$version_id" ] || continue
            examined=$((examined + 1))
            IFS=',' read -ra tag_array <<< "$tags"

            # Check if any tag on this version is in the keep set.
            keep=false
            for tag in "${tag_array[@]}"; do
              if [ -n "${keep_tag[$tag]:-}" ]; then
                keep=true
                break
              fi
            done

            # Check if this version is relevant (has a tag matching our prefix).
            relevant=false
            for tag in "${tag_array[@]}"; do
              case "$tag" in
                "${PREFIX}-"*) relevant=true; break ;;
              esac
            done

            if $keep; then
              echo "keep    ${version_id}  tags: $tags"
              continue
            fi

            if ! $relevant; then
              echo "skip    ${version_id}  tags: $tags (no ${PREFIX}-* tags)"
              continue
            fi

            echo "delete  ${version_id}  (tags: $tags)"
            if gh api --method DELETE "/users/${OWNER}/packages/container/${PACKAGE}/versions/${version_id}"; then
              deleted=$((deleted + 1))
            else
              echo "  !! delete failed for ${version_id}" >&2
            fi
          done < <(gh api --paginate "/users/${OWNER}/packages/container/${PACKAGE}/versions" \
            --jq '.[] | [.id, (.metadata.container.tags | join(","))] | @tsv')

          {
            echo "### prune (${{ matrix.variant }}, $PREFIX)"
            echo
            echo "- examined: $examined"
            echo "- deleted:  $deleted"
            echo
            echo "Kept tags:"
            for k in "${!keep_tag[@]}"; do echo "- \`$k\`"; done
          } >> "$GITHUB_STEP_SUMMARY"


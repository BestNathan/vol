# Build and push vol-agent-server multi-arch images (amd64 + arm64) to ACR.
#
# Strategy: build amd64 and arm64 on native runners in parallel, then merge
# the two per-arch manifests into a single multi-arch tag with buildx
# imagetools. This avoids QEMU emulation entirely (qemu + aws-lc-sys turns
# a 5-minute compile into a 40-minute one).
#
# Two role-specific images per commit, sharing one repo:
#   crpi-...aliyuncs.com/n_common/vol-agent-server:cp-<sha>   (control plane)
#   crpi-...aliyuncs.com/n_common/vol-agent-server:dp-<sha>   (data plane)
#
# main pushes also get cp-latest / dp-latest moving tags.
#
# Required secrets:
#   DOCKER_USERNAME — ACR login user
#   DOCKER_PASSWORD — ACR login password
#
# Override the ACR endpoint or repo via repo / org variables:
#   vars.ACR_REGISTRY  (default: crpi-ck06yio90i1ttwlz.cn-beijing.personal.cr.aliyuncs.com)
#   vars.ACR_NAMESPACE (default: n_common)

name: build-vol-agent-server

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "configs/vol-agent-server.*.toml"
      - "dockers/vol-agent-server.Dockerfile"
      - ".cargo/config.toml"
      - ".github/workflows/build-vol-agent-server.yml"
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push images to ACR (uncheck to build-only)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

env:
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY || 'crpi-ck06yio90i1ttwlz.cn-beijing.personal.cr.aliyuncs.com' }}
  ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE || 'n_common' }}
  IMAGE_NAME: vol-agent-server

jobs:
  # ── Per-arch builds run on native runners ────────────────────────────────
  build:
    name: build (${{ matrix.role }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        role: [control-plane, data-plane]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether to push
        id: push
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.push_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to ACR
        if: steps.push.outputs.value == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/vol-agent-server.Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            ROLE=${{ matrix.role }}
          # Push by digest only — tags are attached later in the manifest job.
          outputs: type=image,name=${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ steps.push.outputs.value == 'true' }}
          provenance: false
          cache-from: type=gha,scope=vol-agent-server-${{ matrix.role }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=vol-agent-server-${{ matrix.role }}-${{ matrix.arch }}

      - name: Export digest
        if: steps.push.outputs.value == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: steps.push.outputs.value == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.role }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Merge per-arch images into one multi-arch tag, per role ──────────────
  manifest:
    name: manifest (${{ matrix.role }})
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: control-plane
            tag_prefix: cp
          - role: data-plane
            tag_prefix: dp

    steps:
      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.role }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compose tag args
        id: tags
        run: |
          IMG="${ACR_REGISTRY}/${ACR_NAMESPACE}/${IMAGE_NAME}"
          PREFIX="${{ matrix.tag_prefix }}"
          SHA="${{ steps.sha.outputs.short }}"
          TAGS=("${IMG}:${PREFIX}-${SHA}")
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS+=("${IMG}:${PREFIX}-latest")
          fi
          ARGS=""
          for t in "${TAGS[@]}"; do ARGS="$ARGS -t $t"; done
          {
            echo "args=$ARGS"
            echo "img=$IMG"
            echo "list<<EOF"
            for t in "${TAGS[@]}"; do echo "$t"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        # shellcheck disable=SC2046,SC2086
        run: |
          digests=$(printf '${{ steps.tags.outputs.img }}@sha256:%s ' *)
          # shellcheck disable=SC2086
          docker buildx imagetools create ${{ steps.tags.outputs.args }} $digests

      - name: Inspect
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            echo "── $tag"
            docker buildx imagetools inspect "$tag"
          done <<< "${{ steps.tags.outputs.list }}"

      - name: Summary
        run: |
          {
            echo "### vol-agent-server (${{ matrix.role }})"
            echo
            echo "- short SHA: \`${{ steps.sha.outputs.short }}\`"
            echo "- platforms: linux/amd64, linux/arm64"
            echo
            echo "Tags:"
            while IFS= read -r tag; do
              [ -n "$tag" ] || continue
              echo "- \`$tag\`"
            done <<< "${{ steps.tags.outputs.list }}"
          } >> "$GITHUB_STEP_SUMMARY"

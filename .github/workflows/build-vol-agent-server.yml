# Build and push vol-agent-server multi-arch images (amd64 + arm64) to ACR.
#
# Two role-specific images per commit, sharing one repo:
#   crpi-...aliyuncs.com/n_common/vol-agent-server:cp-<sha>   (control plane)
#   crpi-...aliyuncs.com/n_common/vol-agent-server:dp-<sha>   (data plane)
#
# main pushes also get cp-latest / dp-latest moving tags.
#
# Required secrets:
#   DOCKER_USERNAME — ACR login user
#   DOCKER_PASSWORD — ACR login password
#
# Override the ACR endpoint or repo via repo / org variables:
#   vars.ACR_REGISTRY  (default: crpi-ck06yio90i1ttwlz.cn-beijing.personal.cr.aliyuncs.com)
#   vars.ACR_NAMESPACE (default: n_common)

name: build-vol-agent-server

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "configs/vol-agent-server.*.toml"
      - "dockers/vol-agent-server.Dockerfile"
      - ".cargo/config.toml"
      - ".github/workflows/build-vol-agent-server.yml"
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push images to ACR (uncheck to build-only)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

env:
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY || 'crpi-ck06yio90i1ttwlz.cn-beijing.personal.cr.aliyuncs.com' }}
  ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE || 'n_common' }}
  IMAGE_NAME: vol-agent-server

jobs:
  build:
    name: build (${{ matrix.role }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: control-plane
            tag_prefix: cp
          - role: data-plane
            tag_prefix: dp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether to push
        id: push
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.push_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to ACR
        if: steps.push.outputs.value == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute image tags
        id: tags
        run: |
          IMG="${ACR_REGISTRY}/${ACR_NAMESPACE}/${IMAGE_NAME}"
          PREFIX="${{ matrix.tag_prefix }}"
          SHA="${{ steps.sha.outputs.short }}"
          TAGS="${IMG}:${PREFIX}-${SHA}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${IMG}:${PREFIX}-latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Resolved tags:"
          echo "$TAGS" | tr ',' '\n' | sed 's/^/  - /'

      - name: Build and push (${{ matrix.role }}, amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/vol-agent-server.Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            ROLE=${{ matrix.role }}
          tags: ${{ steps.tags.outputs.tags }}
          push: ${{ steps.push.outputs.value == 'true' }}
          provenance: false
          cache-from: type=gha,scope=vol-agent-server-${{ matrix.role }}
          cache-to: type=gha,mode=max,scope=vol-agent-server-${{ matrix.role }}

      - name: Summary
        run: |
          {
            echo "### vol-agent-server (${{ matrix.role }})"
            echo
            echo "- short SHA: \`${{ steps.sha.outputs.short }}\`"
            echo "- platforms: linux/amd64, linux/arm64"
            echo "- pushed: \`${{ steps.push.outputs.value }}\`"
            echo
            echo "Tags:"
            for t in $(echo "${{ steps.tags.outputs.tags }}" | tr ',' ' '); do
              echo "- \`$t\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"

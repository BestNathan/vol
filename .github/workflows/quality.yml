# Quality gate — runs on pull requests and manual dispatch.
# Fast feedback loop: fmt → check → clippy → test → boundaries.
# Uses rust-toolchain.toml (pinned toolchain with rustfmt + clippy components).

name: quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "rust-toolchain.toml"
      - "clippy.toml"
      - ".cargo/config.toml"
      - "Makefile"
      - ".github/workflows/quality.yml"
  workflow_dispatch:

env:
  RUSTFLAGS: ""
  CARGO_INCREMENTAL: "1"

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: "."
          cache-all-crates: "true"

      - name: Remove rsproxy mirror (CI can't access rsproxy.cn)
        run: rm -f .cargo/config.toml

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (workspace, covers check, deny warnings)
        run: cargo clippy --workspace -- -D warnings

      - name: Check no doc tests
        run: ./scripts/check-no-doc-tests.sh

      - name: Install cargo-nextest (pre-built binary)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run all tests (nextest, fallback to cargo test)
        run: cargo nextest run --workspace --no-fail-fast 2>/dev/null || cargo test --workspace --no-fail-fast

      - name: Check agent boundaries
        run: ./scripts/check-agent-boundaries.sh

  # ── Coverage (blocking quality gate) ─────────────────────────────────
  coverage:
    name: coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: "."
          cache-all-crates: "true"
          components: "llvm-tools-preview"

      - name: Install cargo-llvm-cov (pre-built binary)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage (core LLM crates, threshold ≥ 80%)
        run: |
          PKG="vol-agent-server vol-llm-agent-protocol vol-llm-runtime vol-llm-sandbox vol-llm-task vol-session vol-llm-agent vol-llm-provider vol-llm-tool vol-llm-skill vol-llm-mcp"
          cargo llvm-cov $(for p in $PKG; do echo "--package $p"; done) --summary-only 2>&1 | tee /tmp/cov-output.txt
          LINE_COV=$(grep '^TOTAL' /tmp/cov-output.txt | awk '{print $4}' | tr -d '%')
          if [ -z "${LINE_COV}" ]; then
            echo "FAIL: could not determine coverage (missing TOTAL line)"
            exit 1
          fi
          echo ""
          echo "--- Threshold check ---"
          echo "Line coverage: ${LINE_COV}% (required ≥ 80%)"
          if [ "$(echo "${LINE_COV} < 80" | bc 2>/dev/null)" = "1" ]; then
            echo "FAIL: line coverage ${LINE_COV}% is below 80%"
            exit 1
          fi
          echo "PASS: line coverage ${LINE_COV}% ≥ 80%"

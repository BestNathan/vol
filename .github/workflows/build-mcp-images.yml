# Build and push MCP server images to GHCR, then update GitOps manifests.
#
# Initial scope: docs-rs-mcp on linux/amd64.
#
# Uses the built-in GITHUB_TOKEN for GHCR auth — no extra secrets needed.
# Requires packages: write and contents: write permissions.
#
# Optional repo/org variables:
#   vars.GHCR_REPO  (default: ghcr.io/bestnathan)

name: build-mcp-images

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/vol-mcp-servers/**"
      - "dockers/vol-mcp-servers.Dockerfile"
      - ".cargo/config.toml"
      - ".github/workflows/build-mcp-images.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "MCP service to build"
        required: false
        default: "docs-rs-mcp"
        type: choice
        options:
          - docs-rs-mcp
          - cli-tools-mcp
      push_image:
        description: "Push image to GHCR and update GitOps manifest"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

env:
  GHCR_REPO: ghcr.io/bestnathan

concurrency:
  group: build-mcp-images
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.service }})
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: docs-rs-mcp
            manifest: deploy/argocd/manifests/workloads/mcp/docs-rs-mcp/deployment.yaml
          - service: cli-tools-mcp
            manifest: deploy/argocd/manifests/workloads/mcp/cli-tools-mcp/deployment.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip non-selected manual services
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.service != matrix.service
        run: echo "Skipping ${{ matrix.service }} because workflow_dispatch selected ${{ github.event.inputs.service }}"

      - name: Stop skipped service
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.service != matrix.service
        run: exit 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether to push
        id: push
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.push_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute image tag
        id: image
        run: |
          short="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          image="${GHCR_REPO}/${{ matrix.service }}:${short}"
          {
            echo "short=${short}"
            echo "image=${image}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.push.outputs.value == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/vol-mcp-servers.Dockerfile
          platforms: linux/amd64
          build-args: |
            BIN=${{ matrix.service }}
            REGION=global
          tags: ${{ steps.image.outputs.image }}
          push: ${{ steps.push.outputs.value == 'true' }}
          provenance: false
          cache-from: type=gha,scope=mcp-${{ matrix.service }}-amd64
          cache-to: type=gha,mode=max,scope=mcp-${{ matrix.service }}-amd64

      - name: Update GitOps manifest image
        if: steps.push.outputs.value == 'true'
        env:
          MANIFEST: ${{ matrix.manifest }}
          IMAGE: ${{ steps.image.outputs.image }}
          SERVICE: ${{ matrix.service }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          manifest = Path(os.environ["MANIFEST"])
          image = os.environ["IMAGE"]
          service = os.environ["SERVICE"]
          lines = manifest.read_text().splitlines()
          updated = []
          replaced = False
          for line in lines:
              stripped = line.strip()
              if stripped.startswith("image: ") and service in stripped:
                  indent = line[: len(line) - len(line.lstrip())]
                  updated.append(f"{indent}image: {image}")
                  replaced = True
              else:
                  updated.append(line)
          if not replaced:
              raise SystemExit(f"no {service} image field found in {manifest}")
          manifest.write_text("\n".join(updated) + "\n")
          PY

      - name: Commit GitOps manifest update
        if: steps.push.outputs.value == 'true'
        run: |
          if git diff --quiet -- "${{ matrix.manifest }}"; then
            echo "No GitOps manifest change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ matrix.manifest }}"
          git commit -m "ci(gitops): update ${{ matrix.service }} image to ${{ steps.image.outputs.short }} [skip ci]"
          git pull --rebase origin main
          git push

      - name: Summary
        run: |
          {
            echo "### ${{ matrix.service }}"
            echo
            echo "- image: \`${{ steps.image.outputs.image }}\`"
            echo "- manifest: \`${{ matrix.manifest }}\`"
            echo "- pushed: \`${{ steps.push.outputs.value }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

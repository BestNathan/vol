# Sync runtime configuration from source files into GitOps ConfigMap manifests.
#
# Reads source configuration files from the repository and generates Kubernetes
# ConfigMap manifests under deploy/argocd/manifests/runtime-config/. When any
# source file changes on main, this workflow regenerates the ConfigMaps and
# commits them so ArgoCD can sync the updated runtime configuration.
#
# Source → ConfigMap mapping:
#   .agents/agents/*.md       → agents-configmap.yaml     (auto-mount keys as files)
#   .agents/providers/*.toml  → providers-configmap.yaml   (auto-mount keys as files)
#   .agents/skills/*/SKILL.md → skills-configmap.yaml      (explicit items: key→subdir/path)
#   .agents/sandboxes/*.toml  → sandboxes-configmap.yaml   (auto-mount keys as files)
#   .mcp.json                 → mcp-configmap.yaml         (explicit items: key→.mcp.json)
#
# Required permissions:
#   contents: write  (commit generated ConfigMaps)

name: sync-runtime-config

on:
  push:
    branches: [main]
    paths:
      - ".agents/agents/*.md"
      - ".agents/providers/*.toml"
      - ".agents/skills/**"
      - ".agents/sandboxes/*.toml"
      - ".mcp.json"
      - "scripts/sync-configmaps.py"
      - ".github/workflows/sync-runtime-config.yml"
  workflow_dispatch:

concurrency:
  group: sync-runtime-config
  cancel-in-progress: false

jobs:
  sync:
    name: sync-configmaps
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate ConfigMap manifests
        run: python3 scripts/sync-configmaps.py

      - name: Commit generated manifests
        run: |
          if git diff --quiet -- deploy/argocd/manifests/runtime-config; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/argocd/manifests/runtime-config/agents-configmap.yaml \
                  deploy/argocd/manifests/runtime-config/providers-configmap.yaml \
                  deploy/argocd/manifests/runtime-config/skills-configmap.yaml \
                  deploy/argocd/manifests/runtime-config/sandboxes-configmap.yaml \
                  deploy/argocd/manifests/runtime-config/mcp-configmap.yaml
          git commit -m "ci(gitops): sync runtime config configmaps [skip ci]"
          git pull --rebase origin main
          git push

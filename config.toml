# Notifications
[[notifications]]
id = "feishu-alerts"
type = "feishu"
app_id = "cli_a936b13197385bde"
app_secret = "JnWnFrrOvzHi4deDmFY9kd1NMGbiWuNz"
receive_id = "oc_c29208d94757e2aefd97bfa5f57e0b26"
enabled = true

[[notifications]]
id = "stdout"
type = "stdout"
enabled = true

# Rules
[[rules]]
id = "absolute-iv-btc"
type = "absolute-iv"
symbol = "BTC"
short_threshold = 0.55
medium_threshold = 0.53
long_threshold = 0.51
short_atm_threshold = 0.10   # Short-term: ATM ±10%
medium_atm_threshold = 0.15  # Medium-term: ATM ±15%
long_atm_threshold = 0.20    # Long-term: ATM ±20%
enabled = true
notifications = ["feishu-alerts", "stdout"]

[[rules]]
id = "absolute-iv-eth"
type = "absolute-iv"
symbol = "ETH"
short_threshold = 0.75
medium_threshold = 0.73
long_threshold = 0.71
short_atm_threshold = 0.10   # Short-term: ATM ±10%
medium_atm_threshold = 0.15  # Medium-term: ATM ±15%
long_atm_threshold = 0.20    # Long-term: ATM ±20%
enabled = true
notifications = ["feishu-alerts", "stdout"]

[[rules]]
id = "rate-change-btc"
type = "rate-change"
symbol = "BTC"
window_1h_threshold = 0.05
window_4h_threshold = 0.10
window_24h_threshold = 0.20
enabled = true
notifications = ["feishu-alerts", "stdout"]

[[rules]]
id = "rate-change-eth"
type = "rate-change"
symbol = "ETH"
window_1h_threshold = 0.05
window_4h_threshold = 0.10
window_24h_threshold = 0.20
enabled = true
notifications = ["feishu-alerts", "stdout"]

[[rules]]
id = "term-structure"
type = "term-structure"
short_long_spread_threshold = 0.15
enabled = false
notifications = ["stdout"]

[[rules]]
id = "skew"
type = "skew"
symbol = "BTC"
threshold = 0.10
enabled = false
notifications = ["stdout"]

[[rules]]
id = "portfolio-margin"
type = "margin-ratio"
datasources = ["internal-portfolio"]
min_threshold = 1.2
enabled = false
notifications = ["feishu-alerts"]

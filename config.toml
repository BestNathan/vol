# config.toml for vol-monitor - New format with layered arrays

[engine]
hot_reload = true
hot_reload_interval_secs = 30
channel_buffer_size = 1000
alert_cooldown_secs = 300

[tenors]
short_max_dte = 7
medium_min_dte = 20
medium_max_dte = 40
long_min_dte = 80

# Data sources - array format
[[datasources]]
id = "deribit-markets"
type = "web-socket"
provider = "deribit"
ws_url = "wss://www.deribit.com/ws/api/v2"
channels = ["markprice.btc", "markprice.eth"]
poll_interval_secs = 60
enabled = true

[datasources.auth]
client_id = "nhXng7Bj"
client_secret = "OxCGY10HlzgKfRoXPBRQqg5IBQcZguGPhE1tewP5U3Y"

# Notifications - array format
[[notifications]]
id = "feishu-alerts"
type = "feishu"
app_id = "cli_a936b13197385bde"
app_secret = "JnWnFrrOvzHi4deDmFY9kd1NMGbiWuNz"
receive_id = "oc_c29208d94757e2aefd97bfa5f57e0b26"
enabled = true

[[notifications]]
id = "stdout"
type = "stdout"
enabled = true

# Rules - array format
[[rules]]
id = "absolute-iv-btc"
type = "absolute-iv"
symbol = "BTC"
short_threshold = 0.55
medium_threshold = 0.53
long_threshold = 0.51
enabled = true
notifications = ["feishu-alerts", "stdout"]

[[rules]]
id = "absolute-iv-eth"
type = "absolute-iv"
symbol = "ETH"
short_threshold = 0.75
medium_threshold = 0.73
long_threshold = 0.71
enabled = true
notifications = ["feishu-alerts", "stdout"]

[[rules]]
id = "rate-change-btc"
type = "rate-change"
symbol = "BTC"
window_1h_threshold = 0.05
window_4h_threshold = 0.10
window_24h_threshold = 0.20
enabled = true
notifications = ["feishu-alerts", "stdout"]

[[rules]]
id = "rate-change-eth"
type = "rate-change"
symbol = "ETH"
window_1h_threshold = 0.05
window_4h_threshold = 0.10
window_24h_threshold = 0.20
enabled = true
notifications = ["feishu-alerts", "stdout"]

[[rules]]
id = "term-structure"
type = "term-structure"
short_long_spread_threshold = 0.15
enabled = false
notifications = ["stdout"]

[[rules]]
id = "skew"
type = "skew"
symbol = "BTC"
threshold = 0.10
enabled = false
notifications = ["stdout"]

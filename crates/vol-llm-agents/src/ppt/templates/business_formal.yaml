id: business_formal
name: 商务正式
description: 适合商务汇报、融资路演等正式场合

tags:
  occasion: ["pitch_deck", "report", "presentation"]
  style: ["minimal", "professional", "clean"]
  audience: ["executive", "investor", "client"]

color_scheme:
  primary: "#1a365d"
  secondary: "#2d5a8a"
  accent: "#c9a227"
  background: "#ffffff"
  text_primary: "#1a1a1a"
  text_secondary: "#666666"

typography:
  title_font: "Microsoft YaHei"
  body_font: "Arial"

layouts:
  - layout_type: title
    elements:
      - element_type: textbox
        placeholder: title
        position:
          x: 457200
          y: 1828800
          width: 8229600
          height: 914400
        style:
          font_size: 44
          color: "{{primary}}"
      - element_type: textbox
        placeholder: subtitle
        position:
          x: 457200
          y: 3200400
          width: 8229600
          height: 685800
        style:
          font_size: 24
          color: "{{text_secondary}}"

  - layout_type: content
    elements:
      - element_type: textbox
        placeholder: title
        position:
          x: 457200
          y: 228600
          width: 8229600
          height: 914400
        style:
          font_size: 28
          color: "{{primary}}"
      - element_type: textbox
        placeholder: content
        position:
          x: 457200
          y: 1371600
          width: 8229600
          height: 4572000
        style:
          font_size: 16
          color: "{{text_primary}}"
          bullet_style: "bullet"

  - layout_type: table_of_contents
    elements:
      - element_type: textbox
        placeholder: title
        position:
          x: 457200
          y: 228600
          width: 8229600
          height: 914400
        style:
          font_size: 32
          color: "{{primary}}"
      - element_type: textbox
        placeholder: sections
        position:
          x: 685800
          y: 1371600
          width: 7772400
          height: 4572000
        style:
          font_size: 18
          color: "{{text_primary}}"

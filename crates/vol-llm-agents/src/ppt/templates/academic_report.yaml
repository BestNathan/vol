id: academic_report
name: 学术报告
description: 适合学术论文、研究报告

tags:
  occasion: ["academic", "research", "thesis"]
  style: ["formal", "structured", "detailed"]
  audience: ["academic", "researcher", "professor"]

color_scheme:
  primary: "#1e3a5f"
  secondary: "#3d5a7a"
  accent: "#8b4513"
  background: "#ffffff"
  text_primary: "#000000"
  text_secondary: "#333333"

typography:
  title_font: "Times New Roman"
  body_font: "Arial"

layouts:
  - layout_type: title
    elements:
      - element_type: textbox
        placeholder: title
        position:
          x: 457200
          y: 1828800
          width: 8229600
          height: 914400
        style:
          font_size: 44
          color: "{{primary}}"
      - element_type: textbox
        placeholder: subtitle
        position:
          x: 457200
          y: 3200400
          width: 8229600
          height: 685800
        style:
          font_size: 24
          color: "{{text_secondary}}"

  - layout_type: content
    elements:
      - element_type: textbox
        placeholder: title
        position:
          x: 457200
          y: 228600
          width: 8229600
          height: 914400
        style:
          font_size: 28
          color: "{{primary}}"
      - element_type: textbox
        placeholder: content
        position:
          x: 457200
          y: 1371600
          width: 8229600
          height: 4572000
        style:
          font_size: 16
          color: "{{text_primary}}"
          bullet_style: "bullet"

  - layout_type: table_of_contents
    elements:
      - element_type: textbox
        placeholder: title
        position:
          x: 457200
          y: 228600
          width: 8229600
          height: 914400
        style:
          font_size: 32
          color: "{{primary}}"
      - element_type: textbox
        placeholder: sections
        position:
          x: 685800
          y: 1371600
          width: 7772400
          height: 4572000
        style:
          font_size: 18
          color: "{{text_primary}}"

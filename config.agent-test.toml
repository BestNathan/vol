# config.agent-test.toml - Agent Advice 测试配置
# 用于测试 Agent 接入的简化配置

[engine]
hot_reload = false
hot_reload_interval_secs = 30
channel_buffer_size = 100
alert_cooldown_secs = 30  # 更短的冷却时间用于测试

[engine.tenor_cooldowns]
short_secs = 60
medium_secs = 120
long_secs = 300

[tenors]
short_max_dte = 7
medium_min_dte = 20
medium_max_dte = 40
long_min_dte = 80
long_max_dte = 200

# Deribit 客户端配置
[clients.deribit]
ws_url = "wss://test.deribit.com/ws/api/v2"

# 数据源
[[datasources]]
id = "deribit-markets"
type = "volatility"
symbols = ["BTC", "ETH"]

# 通知 - 仅 stdout 用于测试
[[notifications]]
id = "stdout"
type = "stdout"
enabled = true

# 规则 - 使用非常宽松的阈值以便触发测试
[[rules]]
id = "absolute-iv-btc"
type = "absolute-iv"
symbol = "BTC"
short_threshold = 0.10  # 非常低的阈值，容易触发
medium_threshold = 0.10
long_threshold = 0.10
short_atm_threshold = 0.05
medium_atm_threshold = 0.05
long_atm_threshold = 0.05
enabled = true
notifications = ["stdout"]

[[rules]]
id = "absolute-iv-eth"
type = "absolute-iv"
symbol = "ETH"
short_threshold = 0.10
medium_threshold = 0.10
long_threshold = 0.10
short_atm_threshold = 0.05
medium_atm_threshold = 0.05
long_atm_threshold = 0.05
enabled = true
notifications = ["stdout"]

# 追踪配置
[tracing]
[tracing.logging]
log_dir = "./logs"
log_prefix = "vol-monitor-agent-test"
retention_days = 1
max_file_size_mb = 50
json_format = false
console_level = "debug"
file_level = "debug"
error_file = true

[tracing.opentelemetry]
enabled = false

# LLM Provider 配置
[[llm_providers]]
id = "anthropic-main"
provider = "anthropic"
model = "claude-sonnet-4-6"
api_key = "${ANTHROPIC_AUTH_TOKEN}"
base_url = "https://coding.dashscope.aliyuncs.com/apps/anthropic"

# Agent Advice 配置
[agent_advice]
enabled = true
cooldown_secs = 30  # 30 秒冷却用于测试
max_analyses_per_hour = 10
llm_provider_id = "anthropic-main"

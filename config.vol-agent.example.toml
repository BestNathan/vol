# config.vol-agent.example.toml — vol-agent-server configuration
#
# Copy to ~/.vol/agent-server.toml or pass via --config <path>.
#
# The agent framework auto-discovers these from disk:
#   .agents/providers/*.toml     — LLM provider definitions
#   .mcp.json                     — MCP server definitions
#   .agents/agents/*.md          — Agent definitions (Markdown + YAML frontmatter)
#   .agents/agents/*.yaml        — YAML agent definitions
#   .agents/skills/*/SKILL.md    — Skill definitions
#
# Only [server], [runtime], and [tracing] below are read by the binary.
# Provider, MCP, agent, and skill config lives on disk at the paths above.

# =============================================================================
# Server — JSON-RPC WebSocket backend
# =============================================================================
[server]
# Bind address for the JSON-RPC agent service
host = "0.0.0.0"
port = 3001

# =============================================================================
# Runtime — working and data directories
# =============================================================================
[runtime]
# Project root for agent discovery (.agents/ dirs, .mcp.json, etc.)
working_dir = "."

# Data store directory (sessions, file-backed tasks, logs)
# Supports ~ tilde expansion
store_dir = "~/.vol"

# Optional task store backend. If omitted, the server uses the file task store
# rooted under runtime.store_dir.
#
# Local SQLite database store. Task, session, and future runtime stores can share
# the same database file; each store owns its own tables.
[runtime.task_store]
type = "database"
url = "sqlite://~/.vol/data.db"
#
# Explicit file store:
# [runtime.task_store]
# type = "file"
#
# Postgres example:
# [runtime.task_store]
# type = "database"
# url = "postgres://USER:PASSWORD@HOST:5432/DATABASE"

# Session store configuration.
# Defaults to file-backed JSONL sessions under the agent store directory.
# Uses the same local SQLite database as task_store by default.
[runtime.session_store]
type = "database"
url = "sqlite://~/.vol/data.db"

# Explicit file store:
# [runtime.session_store]
# type = "file"

# Postgres session database example:
# [runtime.session_store]
# type = "database"
# url = "postgres://vol_agent:vol_agent@localhost:5432/vol_agent_sessions"

# =============================================================================
# Tracing — logging configuration
# =============================================================================
[tracing]
# Log level: trace, debug, info, warn, error
# Can also be overridden by RUST_LOG env var
level = "info"

# Log format: "text" or "json"
format = "text"

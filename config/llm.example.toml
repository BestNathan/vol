# LLM Provider Configuration Examples
#
# This file demonstrates how to configure multiple LLM providers
# for the Agent Advice system.

# =============================================
# LLM Providers Configuration
# =============================================

# Option 1: Single provider with environment variable
[[llm_providers]]
id = "anthropic-main"
provider = "anthropic"
model = "claude-sonnet-4-6"
api_key = "${ANTHROPIC_AUTH_TOKEN}"
base_url = "https://coding.dashscope.aliyuncs.com/apps/anthropic"

# Option 2: Multiple providers with fallback
# Uncomment to enable multi-provider setup
#
# [[llm_providers]]
# id = "anthropic-primary"
# provider = "anthropic"
# model = "claude-sonnet-4-6"
# api_key = "${ANTHROPIC_AUTH_TOKEN}"
# base_url = "https://coding.dashscope.aliyuncs.com/apps/anthropic"
#
# [[llm_providers]]
# id = "openai-backup"
# provider = "openai"
# model = "gpt-4o"
# api_key = "${OPENAI_API_KEY:sk-fallback-key}"
# base_url = "https://api.openai.com/v1"

# =============================================
# Agent Advice Configuration
# =============================================
[agent_advice]
enabled = true
cooldown_secs = 300
max_analyses_per_hour = 20
llm_provider_id = "anthropic-main"

# =============================================
# Secret Value Format Reference
# =============================================
#
# The api_key field supports flexible value formats:
#
# | Format        | Example                           | Description                    |
# |---------------|-----------------------------------|--------------------------------|
# | Literal       | "sk-xxx-key"                      | Direct API key value           |
# | Env Var       | "${API_KEY}"                      | Read from environment variable |
# | Env + Default | "${API_KEY:sk-fallback-key}"      | Env var with fallback value    |
#
# =============================================
# Full Config Integration
# =============================================
#
# This file shows only the LLM-specific sections.
# A complete config.toml should also include:
#
# - engine: Engine configuration
# - clients: Deribit client configuration
# - tenors: Tenor DTE boundaries
# - datasources: Data source configuration
# - notifications: Notification handlers
# - rules: Alert rules
# - tracing: Observability configuration
#
# See config.dev.toml for a complete example.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vol-llm-ui-cp
  namespace: vol-agent-system
  labels:
    app.kubernetes.io/name: vol-llm-ui-cp
    app.kubernetes.io/part-of: vol-agent
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vol-llm-ui-cp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vol-llm-ui-cp
        app.kubernetes.io/part-of: vol-agent
        app.kubernetes.io/component: frontend
    spec:
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/arch: amd64
      imagePullSecrets:
        - name: ghcr-bestnathan
      containers:
        - name: vol-llm-ui
          image: ghcr.io/bestnathan/vol-llm-ui:458bff8
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
                - CHOWN
                - SETGID
                - SETUID
                - DAC_OVERRIDE
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: vol-llm-ui-cp-nginx
            defaultMode: 0644

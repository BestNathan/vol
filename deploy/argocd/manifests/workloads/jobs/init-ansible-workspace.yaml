# init-ansible-workspace — one-time Job to bootstrap /opt/ansible on target
# =============================================================================
# SSHs into the ansible-prod sandbox host (192.168.2.106) and creates a demo
# Ansible workspace.
#
# PREREQUISITE: a real SSH private key must be in the ansible-ssh-key secret.
#   kubectl create secret generic ansible-ssh-key -n vol-agent-system \
#     --from-file=id_ed25519=/path/to/real/key \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Usage:
#   kubectl apply -f deploy/argocd/manifests/workloads/jobs/init-ansible-workspace.yaml
#
# Re-run:
#   kubectl delete job init-ansible-workspace -n vol-agent-system
#   kubectl apply -f deploy/argocd/manifests/workloads/jobs/init-ansible-workspace.yaml
#
# Local alternative (faster, doesn't need K8s):
#   SSH_KEY=~/.ssh/id_ed25519 ./scripts/init-ansible-workspace.sh
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: init-ansible-workspace
  namespace: vol-agent-system
  labels:
    app.kubernetes.io/name: init-ansible-workspace
    app.kubernetes.io/part-of: vol-agent
    app.kubernetes.io/component: ops
  annotations:
    description: "One-time bootstrap of /opt/ansible on ansible-prod target"
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: init-ansible-workspace
        app.kubernetes.io/part-of: vol-agent
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: ansible-init
          image: alpine:3.21
          command: ["sh", "-euc"]
          args:
            - |
              # Install SSH client using aliyun mirror
              sed -i 's/dl-cdn.alpinelinux.org/mirrors.aliyun.com/g' /etc/apk/repositories
              apk add --no-cache openssh-client

              SSH="ssh -o StrictHostKeyChecking=accept-new -i /app/.ssh/id_ed25519 root@192.168.2.106"

              echo "=== Init Ansible Workspace ==="
              echo "Creating directories..."
              $SSH 'mkdir -p /opt/ansible/{inventories/{production,staging},playbooks,roles,group_vars,host_vars,files,templates,.cache/facts}'

              echo "Writing ansible.cfg..."
              $SSH 'cat > /opt/ansible/ansible.cfg << EOF
              [defaults]
              inventory = /opt/ansible/inventories/production/hosts.yml
              host_key_checking = False
              stdout_callback = yaml
              forks = 5
              timeout = 60
              remote_user = root
              [ssh_connection]
              pipelining = True
              EOF'

              echo "Writing inventory..."
              $SSH 'cat > /opt/ansible/inventories/production/hosts.yml << EOF
              all:
                hosts:
                  target-host:
                    ansible_host: 192.168.2.106
                    ansible_user: root
              EOF'

              echo "Writing demo playbook..."
              $SSH 'cat > /opt/ansible/playbooks/ping.yml << EOF
              ---
              - name: Demo — ping all hosts
                hosts: all
                tasks:
                  - ansible.builtin.ping:
                  - ansible.builtin.command: uptime
                    changed_when: false
              EOF'

              echo "=== Done ==="
              $SSH 'find /opt/ansible -type f | sort'
          env:
            - name: HTTPS_PROXY
              value: "http://192.168.2.98:8890"
            - name: HTTP_PROXY
              value: "http://192.168.2.98:8890"
            - name: NO_PROXY
              value: "localhost,127.0.0.1,192.168.0.0/16,10.0.0.0/8,.svc.cluster.local"
          volumeMounts:
            - name: ssh-key
              mountPath: /app/.ssh
              readOnly: true
      volumes:
        - name: ssh-key
          secret:
            secretName: ansible-ssh-key
            defaultMode: 0600

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vol-llm-ui
  namespace: vol-agent-system
  labels:
    app.kubernetes.io/name: vol-llm-ui
    app.kubernetes.io/part-of: vol-agent
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vol-llm-ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vol-llm-ui
        app.kubernetes.io/part-of: vol-agent
        app.kubernetes.io/component: frontend
    spec:
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/arch: amd64
      imagePullSecrets:
        - name: acr-registry-secret
      containers:
        - name: vol-llm-ui
          image: crpi-ck06yio90i1ttwlz.cn-beijing.personal.cr.aliyuncs.com/n_common/vol-llm-ui:0476cee
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-server-data-plane-config
  namespace: vol-agent-system
  labels:
    app.kubernetes.io/name: agent-server-dp
    app.kubernetes.io/part-of: vol-agent
data:
  agent-server.toml: |
    [server]
    host = "0.0.0.0"
    port = 3002

    [server.roles]
    control_plane = false
    data_plane = true

    [data_plane]
    name = "data-plane-1"
    control_url = "ws://agent-server.vol-agent-system.svc.cluster.local:3001/control/v1/ws"
    heartbeat_secs = 15
    snapshot_on_connect = true

    [runtime]
    working_dir = "/app"
    store_dir = "/app/data"

    [tracing]
    level = "info"
    format = "json"

    [opentelemetry]
    enabled = true
    endpoint = "http://otel-collector.observability.svc.cluster.local:4317"
    service_name = "agent-server-dp"
    service_namespace = "vol-agent"
    deployment_environment = "production"
    sample_rate = 1.0

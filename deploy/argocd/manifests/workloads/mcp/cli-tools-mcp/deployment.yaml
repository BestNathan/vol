apiVersion: apps/v1
kind: Deployment
metadata:
  name: cli-tools-mcp
  namespace: vol-agent-system
  labels:
    app.kubernetes.io/name: cli-tools-mcp
    app.kubernetes.io/part-of: vol-agent
    app.kubernetes.io/component: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cli-tools-mcp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cli-tools-mcp
        app.kubernetes.io/part-of: vol-agent
        app.kubernetes.io/component: mcp
    spec:
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/arch: amd64
      imagePullSecrets:
        - name: acr-registry-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: cli-tools-mcp
          image: crpi-ck06yio90i1ttwlz.cn-beijing.personal.cr.aliyuncs.com/n_common/cli-tools-mcp:PLACEHOLDER
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - "--http"
            - "0.0.0.0:8080"
            - "--cli-tools-dir"
            - "/app/.agents/cli-tools"
            - "--sandboxes-dir"
            - "/app/.agents/sandboxes"
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          env:
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: "cli-tools-mcp"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4317"
            - name: RUST_LOG
              value: "info"
            - name: HOME
              value: "/app"
            - name: SSH_KEY_PATH
              value: "/app/.ssh/id_ed25519"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: cli-tools
              mountPath: /app/.agents/cli-tools
              readOnly: true
            - name: sandboxes
              mountPath: /app/.agents/sandboxes
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: ssh-key
              mountPath: /app/.ssh
              readOnly: true
      volumes:
        - name: cli-tools
          configMap:
            name: cli-tools
        - name: sandboxes
          configMap:
            name: agent-sandboxes
        - name: ssh-key
          secret:
            secretName: ansible-ssh-key
            defaultMode: 0400
        - name: tmp
          emptyDir: {}

---
# ── Main server config: data-plane, standalone ───────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-server-dingtalk-config
  namespace: vol-agent-system
  labels:
    app.kubernetes.io/name: agent-server-dingtalk
    app.kubernetes.io/part-of: vol-agent
data:
  agent-server.toml: |
    [server]
    host = "0.0.0.0"
    port = 3001

    [server.roles]
    control_plane = false
    data_plane = true

    [data_plane]
    # Standalone — no control-plane registration
    node_id = "dingtalk-agent"

    [runtime]
    working_dir = "/app"
    store_dir = "/app/data"

    [tracing]
    level = "info"
    format = "json"

---
# ── Agent definitions: only general-purpose ──────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-definitions-dingtalk
  namespace: vol-agent-system
  labels:
    app.kubernetes.io/name: agent-definitions-dingtalk
    app.kubernetes.io/part-of: vol-agent
data:
  general-purpose.md: |
    ---
    name: general-purpose
    type: general-purpose
    description: General-purpose AI assistant for conversation and task help
    max_iterations: 30
    ---

    You are a helpful AI assistant. Answer questions clearly and concisely.

---
# ── LLM Provider: hostname URL to go through proxy ───────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-providers-dingtalk
  namespace: vol-agent-system
  labels:
    app.kubernetes.io/name: agent-providers-dingtalk
    app.kubernetes.io/part-of: vol-agent
data:
  anthropic-dashscope.toml: |
    provider = "anthropic"
    model = "volauto"
    api_key = ""
    base_url = "http://192.168.2.162:31693"

    [body]
    max_tokens = 8192
    temperature = 0.7

    [headers]
    "anthropic-version" = "2023-06-01"
  openai-glm.toml: |
    provider = "openai"
    model = "glm5.1"
    api_key = "${OPENAI_API_KEY}"
    base_url = "http://k8s.nhome.local:31693"

    [body]
    max_tokens = 2048
    temperature = 0.7

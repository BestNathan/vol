apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-server-dingtalk
  namespace: vol-agent-system
  labels:
    app.kubernetes.io/name: agent-server-dingtalk
    app.kubernetes.io/part-of: vol-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-server-dingtalk
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-server-dingtalk
        app.kubernetes.io/part-of: vol-agent
    spec:
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
        - name: ghcr-bestnathan
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: agent-server-dingtalk
          image: ghcr.io/bestnathan/vol-agent-server:dp-67ee808
          imagePullPolicy: Always
          workingDir: /app
          args:
            - "--config"
            - "/etc/agent-server/agent-server.toml"
          ports:
            - containerPort: 3001
              name: ws
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/agent-server
              readOnly: true
            - name: agent-definitions
              mountPath: /app/.agents/agents
              readOnly: true
            - name: agent-providers
              mountPath: /app/.agents/providers
              readOnly: true
            - name: agent-skills
              mountPath: /app/.agents/skills
              readOnly: true
            - name: agent-sandboxes
              mountPath: /app/.agents/sandboxes
              readOnly: true
            - name: mcp-config
              mountPath: /app/.mcp.json
              subPath: mcp.json
              readOnly: true
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          env:
            - name: OTEL_SERVICE_NAME
              value: "agent-server-dingtalk"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4317"
            - name: ANTHROPIC_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-provider-secrets
                  key: ANTHROPIC_AUTH_TOKEN
            - name: RUST_LOG
              value: "info"
      volumes:
        - name: config
          configMap:
            name: agent-server-dingtalk-config
            items:
              - key: agent-server.toml
                path: agent-server.toml
            defaultMode: 0644
        - name: agent-definitions
          configMap:
            name: agent-definitions-dingtalk
            defaultMode: 0644
        - name: agent-providers
          configMap:
            name: agent-providers-dingtalk
            defaultMode: 0644
        - name: agent-skills
          configMap:
            name: agent-skills
            defaultMode: 0644
        - name: agent-sandboxes
          configMap:
            name: agent-sandboxes
            defaultMode: 0644
        - name: mcp-config
          secret:
            secretName: agent-dingtalk-secrets
            defaultMode: 0644
        - name: data
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp
          emptyDir: {}

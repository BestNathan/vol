  # Mount this as /app/.mcp.json in the dingtalk agent deployment.
  mcp.json: |
    {
      "mcpServers": {
        "钉钉文档": {
          "type": "streamable-http",
          "url": "https://mcp-gw.dingtalk.com/server/621fdbe4ef3a5dfbfca57542962095496bfdd56e03f755aeab6a50791ff167ca?key=YOUR_DINGTALK_MCP_KEY"
        }
      }
    }

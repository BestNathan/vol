apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vol-agent-root
  namespace: argocd
  labels:
    app.kubernetes.io/name: vol-agent-root
    app.kubernetes.io/part-of: vol-agent
spec:
  project: default
  source:
    repoURL: https://github.com/BestNathan/vol.git
    targetRevision: main
    path: deploy/argocd/applications
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

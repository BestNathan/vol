[server]
host = "0.0.0.0"
port = 3001

[server.roles]
control_plane = false
data_plane = true

[data_plane]
name = "dingtalk-agent"
heartbeat_secs = 15
snapshot_on_connect = true

[runtime]
working_dir = "/app"
store_dir = "/app/data"

[tracing]
level = "info"
format = "json"

[opentelemetry]
enabled = true
endpoint = "http://otel-collector.observability.svc.cluster.local:4317"
service_name = "agent-server-dingtalk"
service_namespace = "vol-agent"
deployment_environment = "production"
sample_rate = 1.0
